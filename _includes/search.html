<div id="search-overlay" class="search-overlay" hidden data-index-url="{{ '/search.json' | relative_url }}">
  <div class="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-title">
    <div class="search-head">
      <h2 id="search-title">Search ResearchLog</h2>
      <button class="search-close" type="button" data-search-close aria-label="Close search">Close</button>
    </div>

    <label class="sr-only" for="search-input">Search entries</label>
    <input id="search-input" class="search-input" type="text" placeholder="Search title, tags, category, or excerpt" autocomplete="off">

    <p id="search-empty" class="search-empty">Type to search entries. Press Enter to open the first result.</p>
    <ul id="search-results" class="search-results" aria-live="polite"></ul>
  </div>
</div>
