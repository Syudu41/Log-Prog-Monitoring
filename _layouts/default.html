<!doctype html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/tags/' | relative_url }}">Tags</a>
          <button class="search-trigger" type="button" data-search-open>
            Search
            <span class="shortcut-hint">Ctrl/Cmd+K</span>
          </button>
        </nav>
      </div>
      <div class="container author-line">
        <span>{{ site.author.name }}</span>
        <span>{{ site.author.role }}</span>
        <span>{{ site.author.field }}</span>
      </div>
    </header>

    <main class="container main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>{{ site.title }} is published from markdown files and git history.</p>
      </div>
    </footer>

    {% include search.html %}
    <script src="{{ '/assets/js/heatmap.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  </body>
</html>
